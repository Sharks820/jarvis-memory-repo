<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Jarvis Quick Panel</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --line: #334155;
      --txt: #e2e8f0;
      --muted: #94a3b8;
      --accent: #14b8a6;
      --danger: #ef4444;
      --green: #22c55e;
      --yellow: #eab308;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Segoe UI, system-ui, sans-serif;
      background: radial-gradient(1200px 700px at 80% -20%, #1f2937 0%, #0b1220 45%, #070d1a 100%);
      color: var(--txt);
      min-height: 100vh;
      overflow: hidden;
    }
    #fab {
      position: fixed;
      right: 16px;
      bottom: 18px;
      width: 58px;
      height: 58px;
      border-radius: 999px;
      border: 1px solid #2dd4bf66;
      background: linear-gradient(160deg, #0f766e, #0f172a);
      color: #ccfbf1;
      font-weight: 700;
      cursor: pointer;
      z-index: 9999;
    }
    #panel {
      position: fixed;
      right: 16px;
      bottom: 86px;
      width: min(400px, calc(100vw - 20px));
      max-height: calc(100vh - 110px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: color-mix(in oklab, var(--panel) 94%, black 6%);
      backdrop-filter: blur(8px);
      box-shadow: 0 30px 70px rgba(0,0,0,.45);
      padding: 12px;
      display: none;
      z-index: 9999;
    }
    #panel.open { display: block; }
    .row { display: flex; gap: 8px; align-items: center; }
    .row + .row { margin-top: 8px; }
    .title { font-weight: 700; letter-spacing: .2px; }
    .muted { color: var(--muted); font-size: 12px; }
    input, textarea, button, select {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--txt);
      padding: 8px;
      font: inherit;
    }
    input, textarea, select { width: 100%; }
    textarea { min-height: 78px; resize: vertical; }
    button {
      cursor: pointer;
      background: linear-gradient(165deg, #134e4a, #0b1220);
      border-color: #1f766f;
      color: #d1fae5;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.ghost { background: #0b1220; border-color: var(--line); color: var(--txt); }
    button.warn { border-color: #8b1d1d; background: #2a1111; color: #fecaca; }
    button.active { border-color: var(--green); background: #0a2a1a; color: #bbf7d0; }
    .grid3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 6px; }
    .grid4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 6px; }
    .out {
      margin-top: 10px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0a1020;
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.35;
      max-height: 240px;
      overflow: auto;
    }
    details { border: 1px solid var(--line); border-radius: 8px; padding: 6px; }
    summary { cursor: pointer; color: var(--muted); }
    .status-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 8px;
      background: #0a1020;
      border: 1px solid var(--line);
    }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; }
    .badge.green::before { background: var(--green); }
    .badge.red::before { background: var(--danger); }
    .badge.yellow::before { background: var(--yellow); }
    .badge.off { color: var(--muted); }
    .badge.off::before { background: var(--muted); }
    .section-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; margin-top: 10px; margin-bottom: 4px; }
    .response-meta { font-size: 11px; color: var(--accent); margin-top: 4px; }
    .thinking {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      margin-top: 8px;
      border-radius: 8px;
      background: linear-gradient(135deg, #0a1a2a, #0d2030);
      border: 1px solid var(--accent);
      animation: pulse-border 1.8s ease-in-out infinite;
    }
    .thinking.active { display: flex; }
    .thinking .dots { display: flex; gap: 4px; }
    .thinking .dots span {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
      animation: bounce 1.4s ease-in-out infinite;
    }
    .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }
    .thinking-label { font-size: 13px; color: var(--accent); font-weight: 600; }
    .thinking-model { font-size: 11px; color: var(--muted); }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    @keyframes pulse-border {
      0%, 100% { border-color: var(--accent); }
      50% { border-color: #0d9488; }
    }
    .model-tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
      background: #0d2030;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-weight: 600;
      margin-top: 4px;
    }
    @media (max-width: 640px) {
      #panel { right: 10px; left: 10px; width: auto; bottom: 84px; }
      #fab { right: 12px; bottom: 14px; }
    }
  </style>
</head>
<body>
  <button id="fab" title="Toggle Jarvis panel">J</button>
  <section id="panel" aria-label="Jarvis Quick Panel">
    <div class="row" style="justify-content:space-between">
      <div>
        <div class="title">Jarvis Unlimited</div>
        <div class="muted">Ctrl+Space toggle | Ctrl+Enter send</div>
      </div>
      <div class="row" style="gap:4px">
        <span id="connDot" class="badge off" title="API connection status">Offline</span>
        <button id="btnClose" class="ghost" style="padding:4px 8px">Close</button>
      </div>
    </div>

    <!-- Live Status Bar -->
    <div class="status-bar" id="statusBar">
      <span id="badgeDaemon" class="badge off">Daemon: --</span>
      <span id="badgeSafe" class="badge off">Safe: --</span>
      <span id="badgeGaming" class="badge off">Gaming: --</span>
      <span id="badgeMemory" class="badge off">Memory: --</span>
    </div>

    <details>
      <summary>Secure Session</summary>
      <div class="row"><input id="baseUrl" placeholder="Base URL (ex: http://127.0.0.1:8787)" /></div>
      <div class="row"><input id="token" placeholder="Bearer token" /></div>
      <div class="row"><input id="signingKey" placeholder="Signing key" /></div>
      <div class="row"><input id="deviceId" placeholder="Device ID (optional)" /></div>
      <div class="row"><input id="masterPassword" type="password" placeholder="Master password (bootstrap only)" /></div>
      <div class="row"><button id="btnSaveCreds" class="ghost">Save on Device</button><span class="muted" id="credState"></span></div>
    </details>

    <!-- Command Input -->
    <div class="row" style="margin-top:10px">
      <textarea id="commandText" placeholder="Type or dictate a command.&#10;Examples: Jarvis, ops brief | brain status | self heal"></textarea>
    </div>
    <div class="row">
      <label class="muted" style="display:flex;gap:6px;align-items:center" title="When checked, Jarvis may execute shell commands on your system"><input id="execute" type="checkbox" /> Run Actions</label>
      <label class="muted" style="display:flex;gap:6px;align-items:center" title="Allows owner-level operations without additional confirmation"><input id="approve" type="checkbox" /> Admin Ops</label>
      <label class="muted" style="display:flex;gap:6px;align-items:center"><input id="speak" type="checkbox" /> Speak</label>
    </div>
    <div class="row">
      <button id="btnDictate" class="ghost" title="Hold to dictate. Auto-sends when done.">🎤 Dictate &amp; Send</button>
      <button id="btnSend" title="Send the command in the text box">Send Command</button>
    </div>

    <!-- Thinking/Loading indicator -->
    <div id="thinking" class="thinking">
      <div class="dots"><span></span><span></span><span></span></div>
      <div>
        <div class="thinking-label" id="thinkingLabel">Jarvis is thinking...</div>
        <div class="thinking-model" id="thinkingModel"></div>
      </div>
    </div>

    <!-- Runtime Controls (Direct API) -->
    <div class="section-label">Runtime Controls</div>
    <div class="grid4">
      <button id="btnPause" class="warn">Pause</button>
      <button id="btnResume">Resume</button>
      <button id="btnSafeOn">Safe On</button>
      <button id="btnSafeOff" class="ghost">Safe Off</button>
    </div>

    <!-- Quick Actions -->
    <div class="section-label">Quick Actions</div>
    <div class="grid3">
      <button id="btnBrief" class="ghost">Ops Brief</button>
      <button id="btnBrain" class="ghost">Brain Status</button>
      <button id="btnHeal" class="ghost">Self Heal</button>
    </div>

    <!-- Data Views -->
    <div class="row" style="margin-top:6px">
      <button id="btnStatus" class="ghost">Load Status</button>
      <button id="btnDash" class="ghost">Dashboard</button>
    </div>

    <!-- Response Meta (model/provider info) -->
    <div id="responseMeta" class="response-meta" style="display:none"></div>

    <div id="dashboard" class="out" style="display:none"></div>
    <div id="out" class="out">Ready.</div>
  </section>

  <script>
    const $ = (id) => document.getElementById(id);
    const panel = $("panel");
    const out = $("out");
    const dashboard = $("dashboard");

    // ---- Global state ----
    let isBusy = false;  // Prevents overlapping commands/dictations

    // ---- Utility ----
    function write(msg) {
      const stamp = new Date().toLocaleTimeString();
      out.textContent = `[${stamp}] ${msg}\n` + out.textContent.slice(0, 7000);
    }

    function showThinking(label, modelHint) {
      const el = $("thinking");
      $("thinkingLabel").textContent = label || "Jarvis is thinking...";
      $("thinkingModel").textContent = modelHint || "";
      el.classList.add("active");
    }

    function hideThinking() {
      $("thinking").classList.remove("active");
    }

    function toggle(open) {
      const next = typeof open === "boolean" ? open : !panel.classList.contains("open");
      panel.classList.toggle("open", next);
      if (next) {
        $("commandText").focus();
        refreshStatus();
      }
    }

    // ---- Crypto helpers ----
    async function hmacSha256Hex(key, message) {
      const enc = new TextEncoder();
      const cryptoKey = await crypto.subtle.importKey("raw", enc.encode(key), { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
      const sig = await crypto.subtle.sign("HMAC", cryptoKey, enc.encode(message));
      return Array.from(new Uint8Array(sig)).map((b) => b.toString(16).padStart(2, "0")).join("");
    }

    function nonce() {
      const arr = new Uint8Array(16);
      crypto.getRandomValues(arr);
      return Array.from(arr).map((b) => b.toString(16).padStart(2, "0")).join("");
    }

    // ---- Credentials ----
    function creds() {
      return {
        baseUrl: $("baseUrl").value.trim().replace(/\/$/, ""),
        token: $("token").value.trim(),
        signingKey: $("signingKey").value.trim(),
        deviceId: $("deviceId").value.trim(),
        masterPassword: $("masterPassword").value,
      };
    }

    function setCredState(msg) {
      $("credState").textContent = msg;
      setTimeout(() => { $("credState").textContent = ""; }, 2200);
    }

    function saveCreds() {
      localStorage.setItem("jarvis.quick.base", $("baseUrl").value.trim());
      localStorage.setItem("jarvis.quick.token", $("token").value.trim());
      localStorage.setItem("jarvis.quick.key", $("signingKey").value.trim());
      localStorage.setItem("jarvis.quick.device", $("deviceId").value.trim());
      setCredState("Saved");
    }

    function loadCreds() {
      $("baseUrl").value = localStorage.getItem("jarvis.quick.base") || window.location.origin;
      $("token").value = localStorage.getItem("jarvis.quick.token") || "";
      $("signingKey").value = localStorage.getItem("jarvis.quick.key") || "";
      $("deviceId").value = localStorage.getItem("jarvis.quick.device") || "";
    }

    // ---- Signed Fetch with timeout ----
    async function signedFetch(path, method, bodyObj, timeoutMs = 30000) {
      const c = creds();
      if (!c.baseUrl || !c.token || !c.signingKey) throw new Error("Set Base URL, Token, and Signing Key in Secure Session.");
      const body = bodyObj ? JSON.stringify(bodyObj) : "";
      const ts = `${Date.now() / 1000}`;
      const n = nonce();
      const signingMaterial = `${ts}\n${n}\n${body}`;
      const sig = await hmacSha256Hex(c.signingKey, signingMaterial);
      const headers = {
        "Authorization": `Bearer ${c.token}`,
        "X-Jarvis-Timestamp": ts,
        "X-Jarvis-Nonce": n,
        "X-Jarvis-Signature": sig,
      };
      if (c.deviceId) headers["X-Jarvis-Device-Id"] = c.deviceId;
      if (c.masterPassword && path === "/bootstrap") headers["X-Jarvis-Master-Password"] = c.masterPassword;
      if (bodyObj) headers["Content-Type"] = "application/json";

      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);

      try {
        const res = await fetch(`${c.baseUrl}${path}`, {
          method,
          headers,
          body: bodyObj ? body : undefined,
          signal: controller.signal,
        });
        clearTimeout(timer);
        const text = await res.text();
        let data = {};
        try { data = JSON.parse(text); } catch { data = { ok: false, raw: text }; }
        if (!res.ok) throw new Error(JSON.stringify(data));
        return data;
      } catch (err) {
        clearTimeout(timer);
        if (err.name === "AbortError") {
          throw new Error("Server not responding (timed out). Is the Jarvis daemon running?");
        }
        if (err.message?.includes("Failed to fetch") || err.message?.includes("NetworkError")) {
          throw new Error("Cannot reach server. Check that the daemon is running and Base URL is correct.");
        }
        throw err;
      }
    }

    // ---- Button state helpers ----
    function withLoading(btn, fn) {
      return async () => {
        if (isBusy) return;  // Prevent overlapping actions
        const original = btn.textContent;
        btn.disabled = true;
        btn.textContent = original + "...";
        isBusy = true;
        try {
          await fn();
        } catch (err) {
          write(`Error: ${err.message || err}`);
        } finally {
          isBusy = false;
          btn.disabled = false;
          btn.textContent = original;
          hideThinking();
        }
      };
    }

    // ---- Response display ----
    function showResponseMeta(data) {
      const meta = $("responseMeta");
      let model = "";
      let provider = "";
      let response = "";

      if (data.stdout_tail && Array.isArray(data.stdout_tail)) {
        for (const line of data.stdout_tail) {
          if (line.startsWith("model=")) model = line.replace("model=", "");
          if (line.startsWith("provider=")) provider = line.replace("provider=", "");
          if (line.startsWith("response=")) response = line.replace("response=", "");
        }
      }

      // Show Jarvis response prominently
      if (response) {
        write(`Jarvis: ${response}`);
      }

      // Show model tag clearly
      if (model || provider) {
        const tag = [model, provider].filter(Boolean).join(" via ");
        meta.innerHTML = `<span class="model-tag">${tag}</span>`;
        meta.style.display = "block";
      } else {
        meta.style.display = "none";
      }
    }

    // ---- Send command ----
    async function sendCommand(text) {
      showThinking("Jarvis is thinking...", "Routing to best model...");
      const payload = {
        text,
        execute: $("execute").checked,
        approve_privileged: $("approve").checked,
        speak: $("speak").checked,
      };
      const data = await signedFetch("/command", "POST", payload, 45000);
      hideThinking();
      const intent = data.intent || "unknown";
      const ok = data.ok ? "success" : "failed";
      write(`[${intent}] ${ok}`);
      showResponseMeta(data);
      if (!data.ok && data.stdout_tail?.length) {
        const reasons = data.stdout_tail.filter(l => l.startsWith("reason="));
        if (reasons.length) write(reasons[0].replace("reason=", "Reason: "));
      }
    }

    // ---- Direct API toggles ----
    async function setRuntimeSetting(settings, label) {
      await signedFetch("/settings", "POST", settings, 10000);
      write(label);
      refreshStatus();
    }

    // ---- Status refresh ----
    async function refreshStatus() {
      try {
        const data = await signedFetch("/settings", "GET", null, 8000);
        const rc = data.settings?.runtime_control || {};
        const gm = data.settings?.gaming_mode || {};

        updateBadge("badgeDaemon", rc.daemon_paused ? "Daemon: Paused" : "Daemon: Running", rc.daemon_paused ? "yellow" : "green");
        updateBadge("badgeSafe", rc.safe_mode ? "Safe: ON" : "Safe: OFF", rc.safe_mode ? "yellow" : "green");
        updateBadge("badgeGaming", gm.enabled ? "Gaming: ON" : "Gaming: OFF", gm.enabled ? "yellow" : "off");
        updateBadge("connDot", "Online", "green");
      } catch {
        updateBadge("connDot", "Offline", "red");
      }

      try {
        const dash = await signedFetch("/dashboard", "GET", null, 8000);
        const d = dash.dashboard || {};
        const mr = d.memory_regression || {};
        const status = mr.status || "unknown";
        const color = status === "pass" ? "green" : status === "warn" ? "yellow" : status === "fail" ? "red" : "off";
        updateBadge("badgeMemory", `Memory: ${status}`, color);
      } catch {
        // Dashboard may not be available
      }
    }

    function updateBadge(id, text, color) {
      const el = $(id);
      el.textContent = text;
      el.className = `badge ${color}`;
    }

    // ---- Dashboard ----
    async function updateDashboard() {
      showThinking("Loading dashboard...");
      const data = await signedFetch("/dashboard", "GET", null, 15000);
      hideThinking();
      const d = data.dashboard || {};
      const ranking = Array.isArray(d.ranking) ? d.ranking : [];
      const etas = Array.isArray(d.etas) ? d.etas : [];
      const mr = d.memory_regression || {};
      const lines = [];
      lines.push(`Score: ${d.jarvis?.score_pct ?? 0}% | Delta: ${d.jarvis?.delta_vs_prev_pct ?? 0}%`);
      if (d.jarvis?.latest_model) lines.push(`Model: ${d.jarvis.latest_model}`);
      lines.push("");
      lines.push("--- Memory Health ---");
      lines.push(`Status: ${mr.status || "unknown"} | Dupes: ${(mr.duplicate_ratio * 100 || 0).toFixed(1)}% | Conflicts: ${mr.unresolved_conflicts ?? 0}`);
      lines.push("");
      lines.push("--- Ranking ---");
      ranking.slice(0, 8).forEach((r, i) => lines.push(`${i + 1}. ${r.name} - ${r.score_pct}%`));
      if (etas.length) {
        lines.push("");
        lines.push("--- ETA ---");
        etas.forEach((e) => {
          const eta = e.eta || {};
          lines.push(`${e.target_name}: ${eta.status} | runs=${eta.runs ?? "n/a"} | days=${eta.days ?? "n/a"}`);
        });
      }
      dashboard.style.display = "block";
      dashboard.textContent = lines.join("\n");
      write("Dashboard loaded");
    }

    // ---- Voice Dictation (auto-sends after recognition) ----
    let activeRec = null;
    function toggleDictation() {
      // If busy or already recording, stop
      if (activeRec) {
        activeRec.stop();
        activeRec = null;
        $("btnDictate").textContent = "\uD83C\uDFA4 Dictate & Send";
        $("btnDictate").classList.remove("active");
        return;
      }
      if (isBusy) {
        write("Wait for the current command to finish.");
        return;
      }

      const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!Speech) { write("Voice not available in this browser. Use Chrome."); return; }

      const rec = new Speech();
      rec.lang = "en-US";
      rec.maxAlternatives = 1;
      rec.interimResults = false;

      function resetDictateBtn() {
        activeRec = null;
        $("btnDictate").textContent = "\uD83C\uDFA4 Dictate & Send";
        $("btnDictate").classList.remove("active");
      }

      rec.onresult = async (evt) => {
        const t = evt.results?.[0]?.[0]?.transcript || "";
        resetDictateBtn();
        if (!t.trim()) { write("No speech detected."); return; }
        $("commandText").value = t;
        write(`Heard: "${t}" — sending...`);
        // Auto-send the command
        try {
          isBusy = true;
          $("btnSend").disabled = true;
          $("btnDictate").disabled = true;
          await sendCommand(t);
        } catch (err) {
          write(`Error: ${err.message || err}`);
        } finally {
          isBusy = false;
          $("btnSend").disabled = false;
          $("btnDictate").disabled = false;
          hideThinking();
        }
      };

      rec.onerror = (evt) => {
        const errMsg = evt.error === "no-speech" ? "No speech detected. Try again."
                     : evt.error === "not-allowed" ? "Microphone blocked. Allow mic access in browser settings."
                     : `Dictation error: ${evt.error || "unknown"}`;
        write(errMsg);
        resetDictateBtn();
      };

      rec.onend = () => { resetDictateBtn(); };

      rec.start();
      activeRec = rec;
      $("btnDictate").textContent = "\uD83C\uDD98 Listening... (tap to cancel)";
      $("btnDictate").classList.add("active");
    }

    // ---- Quick action helpers ----
    async function quickCommand(text) {
      $("commandText").value = text;
      $("execute").checked = true;
      showThinking(`Running: ${text}...`);
      await sendCommand(text);
    }

    // ---- Wire up buttons ----
    $("fab").onclick = () => toggle();
    $("btnClose").onclick = () => toggle(false);
    $("btnSaveCreds").onclick = saveCreds;
    $("btnDictate").onclick = toggleDictation;

    $("btnSend").onclick = withLoading($("btnSend"), async () => {
      const t = $("commandText").value.trim();
      if (!t) { write("Type or dictate a command first."); return; }
      await sendCommand(t);
    });

    // Direct API runtime controls
    $("btnPause").onclick = withLoading($("btnPause"), () =>
      setRuntimeSetting({ daemon_paused: true, reason: "Quick Panel" }, "Daemon paused"));
    $("btnResume").onclick = withLoading($("btnResume"), () =>
      setRuntimeSetting({ daemon_paused: false, reason: "Quick Panel" }, "Daemon resumed"));
    $("btnSafeOn").onclick = withLoading($("btnSafeOn"), () =>
      setRuntimeSetting({ safe_mode: true, reason: "Quick Panel" }, "Safe mode enabled"));
    $("btnSafeOff").onclick = withLoading($("btnSafeOff"), () =>
      setRuntimeSetting({ safe_mode: false, reason: "Quick Panel" }, "Safe mode disabled"));

    // Quick actions
    $("btnBrief").onclick = withLoading($("btnBrief"), () => quickCommand("Jarvis, daily brief"));
    $("btnBrain").onclick = withLoading($("btnBrain"), () => quickCommand("Jarvis, brain status"));
    $("btnHeal").onclick = withLoading($("btnHeal"), () => quickCommand("Jarvis, self heal"));

    $("btnStatus").onclick = withLoading($("btnStatus"), refreshStatus);
    $("btnDash").onclick = withLoading($("btnDash"), updateDashboard);

    // Keyboard shortcuts
    document.addEventListener("keydown", async (evt) => {
      if (evt.ctrlKey && evt.code === "Space") { evt.preventDefault(); toggle(); return; }
      if (evt.ctrlKey && evt.key === "Enter") {
        evt.preventDefault();
        if (isBusy) return;
        const t = $("commandText").value.trim();
        if (!t) return;
        isBusy = true;
        showThinking("Jarvis is thinking...");
        try { await sendCommand(t); } catch (err) { write(`Error: ${err.message || err}`); }
        finally { isBusy = false; hideThinking(); }
      }
    });

    // ---- Init ----
    loadCreds();
    write("Quick panel ready. Tap 'Dictate & Send' to speak a command.");
    setTimeout(() => { refreshStatus().catch(() => {}); }, 500);
  </script>
</body>
</html>

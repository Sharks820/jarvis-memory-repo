name: Smoke Test (daily)

on:
  schedule:
    # Run every day at 06:00 UTC — catches silent import regressions overnight
    - cron: '0 6 * * *'
  # Also allow manual trigger for quick validation
  workflow_dispatch:

jobs:
  smoke:
    name: Daily smoke — all public modules importable
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: engine
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run smoke tests
        working-directory: engine
        env:
          PYTHONPATH: src
        run: |
          python -m pytest tests/test_smoke.py \
            -v \
            --tb=short \
            --junitxml=/tmp/daily-smoke-results.xml
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-smoke-results
          path: /tmp/daily-smoke-results.xml
          retention-days: 30

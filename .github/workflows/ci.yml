name: CI

on:
  # Run on every push to feature/fix/refactor branches so bots and humans get
  # fast feedback before a PR is opened.
  push:
    branches-ignore:
      - main
      - 'release/**'
  # Enforce all gates on every PR targeting main.
  pull_request:
    branches:
      - main

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # 1. Lint — ruff style + format check
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - name: Ruff check
        run: ruff check engine/src
      - name: Ruff format check
        run: ruff format --check engine/src

  # ───────────────────────────────────────────────────────────────────────────
  # 2. Security scan — bandit (fail only on HIGH severity findings)
  # ───────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install bandit
      - name: Run bandit
        # -ll = MEDIUM + HIGH; exclude honeypot (uses intentional patterns)
        run: |
          bandit -r engine/src \
            -ll \
            -x engine/src/jarvis_engine/security/honeypot.py \
            --format json \
            --output /tmp/bandit-report.json || true
          HIGH_COUNT=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('/tmp/bandit-report.json'))
              highs = [r for r in data.get('results', []) if r.get('issue_severity') == 'HIGH']
              print(len(highs))
          except Exception:
              print(0)
          ")
          echo "Bandit HIGH findings: $HIGH_COUNT"
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "ERROR: $HIGH_COUNT HIGH-severity bandit findings — fix before merging"
            python3 -c "
          import json
          data = json.load(open('/tmp/bandit-report.json'))
          for r in data['results']:
              if r['issue_severity'] == 'HIGH':
                  print(f\"  HIGH: {r['issue_text']} — {r['filename']}:{r['line_number']}\")
          "
            exit 1
          fi
      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: /tmp/bandit-report.json
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # 3. Tests with coverage — full pytest suite (multi-Python matrix)
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Tests + Coverage (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        working-directory: engine
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pytest-cov
      - name: Run tests with coverage
        working-directory: engine
        env:
          PYTHONPATH: src
        run: |
          python -m pytest tests/ \
            -x \
            -q \
            --tb=short \
            --junitxml=/tmp/test-results-${{ matrix.python-version }}.xml \
            --cov=jarvis_engine \
            --cov-report=term-missing \
            --cov-report=xml:/tmp/coverage-${{ matrix.python-version }}.xml \
            --cov-fail-under=50
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: /tmp/test-results-${{ matrix.python-version }}.xml
          retention-days: 14
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: /tmp/coverage-${{ matrix.python-version }}.xml
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # 4. Smoke tests — module imports + key behavioral entry-points
  # ───────────────────────────────────────────────────────────────────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: engine
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run smoke tests
        working-directory: engine
        env:
          PYTHONPATH: src
        run: |
          python -m pytest tests/test_smoke.py \
            -v \
            --tb=short \
            --junitxml=/tmp/smoke-results.xml
      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: /tmp/smoke-results.xml
          retention-days: 14
